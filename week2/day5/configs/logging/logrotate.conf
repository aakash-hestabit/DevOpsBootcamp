# Logrotate configuration for DevOps Bootcamp stacks
# File: logging/logrotate.conf
# Deploy: sudo cp logrotate.conf /etc/logrotate.d/devops-stacks

# Nginx access logs — 30 days retention
/var/log/centralized/nginx/*-access.log
/var/log/nginx/stack*-access.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
}

# Nginx error logs — 90 days retention
/var/log/centralized/nginx/error.log
/var/log/nginx/stack*-error.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data adm
}

# Application logs (all stacks) — 60 days retention
/var/log/centralized/stack1/nodejs-api/*.log
/var/log/centralized/stack1/nextjs-app/*.log
/var/log/centralized/stack2/laravel/*.log
/var/log/centralized/stack3/fastapi/*.log
/var/log/centralized/stack3/nextjs/*.log {
    daily
    rotate 60
    compress
    delaycompress
    missingok
    notifempty
    create 0640 syslog adm
    copytruncate
}

# Database logs — 90 days retention
/var/log/centralized/stack1/mongodb/*.log
/var/log/centralized/stack2/mysql/*.log
/var/log/centralized/stack3/mysql/*.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0640 syslog adm
    copytruncate
}

# PM2 logs — 30 days retention
/home/*/Desktop/DevOpsBootcamp/week2/day5/stack*/var/log/apps/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
