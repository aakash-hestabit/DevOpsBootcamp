# PHP Application Reverse Proxy Configuration
upstream php_backend {
    server 127.0.0.1:9000;
}

server {
    listen 80;
    server_name php.devops.local;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name php.devops.local;

    ssl_certificate     /etc/ssl/certs/devops.local.crt;
    ssl_certificate_key /etc/ssl/private/devops.local.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/php-app;
    index index.php;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass    127.0.0.1:9000;
        fastcgi_index   index.php;
        fastcgi_param   SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param   HTTPS on;
    }

    location ~ /\. {
        deny all;
    }

    access_log /var/log/nginx/php-app.access.log;
    error_log  /var/log/nginx/php-app.error.log;
}
