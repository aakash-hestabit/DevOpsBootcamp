global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # cAdvisor — container metrics (CPU, memory, network, disk)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    scrape_interval: 10s
    # Only keep metrics from our project containers
    metric_relabel_configs:
      - source_labels: [name]
        regex: "microservices-.+"
        action: keep
