# File: /etc/nginx/sites-available/stack1.conf
# Deploy with: sudo ln -s /path/to/stack1.conf /etc/nginx/sites-enabled/

# Upstream Pools 

# Backend API upstream (Express.js on 3 instances)
upstream nodejs_api {
    least_conn;
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3003 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3004 max_fails=3 fail_timeout=30s;

    # Connection keepalive to backend
    keepalive 32;
}

# Frontend upstream (Next.js SSR on 2 instances)
upstream nextjs_frontend {
    server 127.0.0.1:3001 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:3002 max_fails=2 fail_timeout=30s;

    keepalive 16;
}

#  HTTP --> HTTPS Redirect 

server {
    listen 80;
    listen [::]:80;
    server_name stack1.devops.local;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Main Server 

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stack1.devops.local;

    # SSL/TLS 
    ssl_certificate     /etc/ssl/certs/stack1.crt;
    ssl_certificate_key /etc/ssl/private/stack1.key;

    # Modern SSL hardening
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS (1 year, include subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security Headers 
    add_header X-Frame-Options        "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header X-XSS-Protection       "1; mode=block"       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    #  Logging 
    access_log /var/log/nginx/stack1-access.log combined;
    error_log  /var/log/nginx/stack1-error.log warn;

    # Health Check (public, no auth) 
    location = /health {
        access_log off;
        return 200 '{"status":"ok","stack":"stack1"}';
        add_header Content-Type application/json;
    }

    # Health Checks 
    # Passive  (Nginx OSS): max_fails/fail_timeout in each upstream block.
    #   - Backend:  removes server after 3 fails within 30s
    #   - Frontend: removes server after 2 fails within 30s
    #
    # Active polling every 5 seconds (external script):
    #   Run: ./health_check_stack1.sh --interval 5
    #   Or as a systemd timer / cron for continuous monitoring.
    #
    # Active health_check directive requires Nginx Plus; for OSS use
    # the bundled health_check_stack1.sh as the active poller.

    # Backend API 
    location /api/ {
        proxy_pass         http://nodejs_api;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer tuning
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # Swagger Docs 
    location /api-docs {
        proxy_pass         http://nodejs_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Frontend (Next.js SSR) 
    location / {
        proxy_pass         http://nextjs_frontend;
        proxy_http_version 1.1;

        # WebSocket / HMR support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts (Next.js SSR can be slow on first load)
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Next.js static assets (cache aggressively) 
    location /_next/static/ {
        proxy_pass http://nextjs_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        # Cache immutable assets for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon & robots 
    location = /favicon.ico { access_log off; log_not_found off; proxy_pass http://nextjs_frontend; }
    location = /robots.txt  { access_log off; log_not_found off; proxy_pass http://nextjs_frontend; }
}
