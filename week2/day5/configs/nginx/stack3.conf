# Description: Nginx load balancer configuration for Stack 3
# Components: FastAPI backend (3 instances), Next.js frontend (2 instances)

# FastAPI Backend Upstream (3 instances with least_conn for API requests)
upstream stack3_fastapi {
    least_conn;
    server 127.0.0.1:8003 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8004 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8005 max_fails=3 fail_timeout=30s;

    # Connection keepalive for persistent connections
    keepalive 32;
}

# Next.js Frontend Upstream (2 instances with round-robin)
upstream stack3_nextjs {
    server 127.0.0.1:3005 max_fails=2 fail_timeout=30s;
    server 127.0.0.1:3006 max_fails=2 fail_timeout=30s;

    keepalive 16;
}

# Proxy cache configuration for API responses
proxy_cache_path /var/cache/nginx/stack3 levels=1:2 keys_zone=stack3_cache:10m max_size=100m inactive=60m use_temp_path=off;

# HTTP to HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name stack3.devops.local;

    # Allow ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Main Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stack3.devops.local;

    # SSL/TLS Configuration
    ssl_certificate     /etc/ssl/certs/stack3.crt;
    ssl_certificate_key /etc/ssl/private/stack3.key;

    # Modern SSL hardening
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security Headers
    add_header X-Frame-Options        "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header X-XSS-Protection       "1; mode=block"       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/stack3-access.log combined;
    error_log  /var/log/nginx/stack3-error.log warn;

    # Nginx Health Check Endpoint
    location = /health {
        access_log off;
        return 200 '{"status":"ok","stack":"stack3"}';
        add_header Content-Type application/json;
    }

    # FastAPI Backend API
    # Proxy all /api requests to FastAPI instances (path preserved)
    location /api/ {
        proxy_pass         http://stack3_fastapi;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer tuning
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # FastAPI Health Check (direct proxy, strip /api prefix)
    location = /api/health {
        proxy_pass         http://stack3_fastapi/health;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        access_log off;
    }

    # FastAPI Swagger Documentation (strip /api prefix not needed, direct proxy)
    location /docs {
        proxy_pass         http://stack3_fastapi/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    location /redoc {
        proxy_pass         http://stack3_fastapi/redoc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    location /openapi.json {
        proxy_pass         http://stack3_fastapi/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Connection        "";
    }

    # API Response Caching (selective - GET requests for products)
    location ~ ^/api/products$ {
        proxy_pass         http://stack3_fastapi;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Cache GET requests only
        proxy_cache            stack3_cache;
        proxy_cache_methods    GET;
        proxy_cache_valid      200 5m;
        proxy_cache_valid      404 1m;
        proxy_cache_key        $scheme$request_method$host$request_uri;
        proxy_cache_bypass     $http_cache_control;
        add_header             X-Cache-Status $upstream_cache_status;
    }

    # Next.js Frontend (root and all non-API routes)
    location / {
        proxy_pass         http://stack3_nextjs;
        proxy_http_version 1.1;

        # WebSocket and HMR support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts for SSR
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Next.js Static Assets (cache aggressively)
    location /_next/static/ {
        proxy_pass http://stack3_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        # Cache immutable assets for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Next.js Image Optimization
    location /_next/image {
        proxy_pass http://stack3_nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        # Cache optimized images
        expires 30d;
        add_header Cache-Control "public";
    }

    # Public static files (favicon, robots, etc.)
    location = /favicon.ico { access_log off; log_not_found off; proxy_pass http://stack3_nextjs; }
    location = /robots.txt  { access_log off; log_not_found off; proxy_pass http://stack3_nextjs; }

    # Error pages
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
