# All values are sourced from the active .env file.
# Run with:  docker compose up -d                   (uses .env)
#            docker compose --env-file .env.dev up  (dev)
#            docker compose --env-file .env.prod up (prod)

services:
  api:
    build: ./api
    restart: unless-stopped
    ports:
      - "${API_PORT}:3000"
    environment:
      APP_NAME:  "${APP_NAME}"
      APP_ENV:   "${APP_ENV}"
      APP_DEBUG: "${APP_DEBUG}"
      APP_PORT:  "3000"
      DB_HOST:   "${DB_HOST}"
      DB_PORT:   "${DB_PORT}"
      DB_NAME:   "${DB_NAME}"
      DB_USER:   "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: "${REDIS_HOST}"
      REDIS_PORT: "${REDIS_PORT}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       "${DB_NAME}"
      POSTGRES_USER:     "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "${REDIS_EXPOSED_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  pg_data:
