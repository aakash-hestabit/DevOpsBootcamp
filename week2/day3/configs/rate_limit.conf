# rate_limit.conf
# Nginx Rate Limiting Configuration
# Include inside the http {} block in nginx.conf:
#   include /etc/nginx/rate_limit.conf;

# Define rate limiting zones
# General API zone: 10 requests/second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Login zone: stricter — 5 requests/minute per IP
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# General web zone: 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;

# Connection limit zone: max 20 simultaneous connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Default rate limit response code
limit_req_status 429;
limit_conn_status 429;

# Usage examples (add inside location {} blocks):
#
# For API endpoints:
#   limit_req zone=api burst=20 nodelay;
#   limit_conn conn_limit 10;
#
# For login endpoints:
#   limit_req zone=login burst=3 nodelay;
#
# For general web:
#   limit_req zone=web burst=50 nodelay;
