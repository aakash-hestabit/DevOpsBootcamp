# File: /etc/nginx/sites-available/stack2.conf
# Deploy with: sudo ln -s /path/to/stack2.conf /etc/nginx/sites-enabled/

# -------------------------------------------------------------------
# Upstream Pools
# -------------------------------------------------------------------

# Laravel API upstream (3 instances with ip_hash for session persistence)
upstream laravel_pool {
    ip_hash;
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8001 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8002 max_fails=3 fail_timeout=30s;

    # Connection keepalive to backend
    keepalive 32;
}

# -------------------------------------------------------------------
# HTTP --> HTTPS Redirect
# -------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name stack2.devops.local;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# -------------------------------------------------------------------
# HTTPS Main Server
# -------------------------------------------------------------------

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stack2.devops.local;

    # Application root (for serving static assets directly via Nginx)
    root /home/aakash/Desktop/DevOpsBootcamp/week2/day5/stack2_laravel_mysql_api/public;
    index index.php;

    # ----- SSL/TLS -----
    ssl_certificate     /etc/ssl/certs/stack2.crt;
    ssl_certificate_key /etc/ssl/private/stack2.key;

    # Modern SSL hardening
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS (1 year, include subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ----- Security Headers -----
    add_header X-Frame-Options        "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header X-XSS-Protection       "1; mode=block"       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ----- Logging -----
    access_log /var/log/nginx/stack2-access.log combined;
    error_log  /var/log/nginx/stack2-error.log warn;

    # ----- Request limits -----
    client_max_body_size 20M;

    # ----- Health Check (public, no auth) -----
    # Nginx-level health endpoint (responds without touching PHP)
    location = /health {
        access_log off;
        return 200 '{"status":"ok","stack":"stack2"}';
        add_header Content-Type application/json;
    }

    # Health Checks
    # Passive (Nginx OSS): max_fails/fail_timeout in upstream block.
    #   Removes a server after 3 consecutive failures within 30 seconds.
    #
    # Active polling (external script):
    #   Run: ./health_check_stack2.sh --interval 5
    #   Or deploy as a systemd timer for continuous monitoring.
    #
    # The /api/health endpoint is the application-level health check
    # that verifies PHP + MySQL connectivity. Both Nginx passive checks
    # and the external script use this endpoint.

    # ----- Static Assets (served directly by Nginx) -----
    # Laravel Vite-compiled assets in /build/
    location /build/ {
        alias /home/aakash/Desktop/DevOpsBootcamp/week2/day5/stack2_laravel_mysql_api/public/build/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Static files: images, CSS, JS, fonts
    location ~* \.(ico|css|js|gif|jpe?g|png|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri =404;
    }

    # ----- API routes (proxy to Laravel pool) -----
    location /api/ {
        proxy_pass         http://laravel_pool;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer tuning
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ----- All other requests (frontend + web routes) -----
    location / {
        proxy_pass         http://laravel_pool;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ----- Deny access to hidden files -----
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Favicon & robots
    location = /favicon.ico { access_log off; log_not_found off; try_files $uri =404; }
    location = /robots.txt  { access_log off; log_not_found off; try_files $uri =404; }
}
