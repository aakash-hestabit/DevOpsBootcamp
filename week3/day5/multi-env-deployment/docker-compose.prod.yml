#   - 3 API replicas for high availability
#   - Nginx reverse-proxy with SSL termination
#   - Resource limits on every container
#   - No source-code mounts, no exposed DB port

services:
  api:
    image: multi-env-node-app:${APP_VERSION:-latest}
    container_name: ""          # Allow multiple replicas
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first       # Zero-downtime rolling update
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M
    environment:
      - LOG_LEVEL=error
    ports: []                    # All traffic enters through nginx

  nginx:
    image: nginx:1.25-alpine
    container_name: app_prod_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  db:
    container_name: app_prod_db
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
