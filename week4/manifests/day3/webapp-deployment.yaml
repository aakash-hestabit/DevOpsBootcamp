apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  labels:
    app: webapp
spec:
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      
      # Init container to create custom HTML
      initContainers:
        - name: create-html
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              cat > /html/index.html << 'EOF'
              <!DOCTYPE html>
              <html>
              <head><title>K8s Bootcamp</title></head>
              <body style="font-family: Arial; text-align: center; padding: 50px;">
                <h1>Kubernetes Bootcamp</h1>
                <p>Pod: <strong>HOSTNAME_PLACEHOLDER</strong></p>
                <p>This pod is part of a Deployment with 3 replicas!</p>
              </body>
              </html>
              EOF
              sed -i "s/HOSTNAME_PLACEHOLDER/$(hostname)/" /html/index.html
          volumeMounts:
            - name: html
              mountPath: /html
      
      volumes:
        - name: html
          emptyDir: {}
