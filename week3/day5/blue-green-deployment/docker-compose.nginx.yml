services:
  nginx:
    image: nginx:1.25-alpine
    container_name: bg-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro    # Mount directory so host edits are immediately visible
    networks:
      - bg-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

networks:
  bg-network:
    external: true
