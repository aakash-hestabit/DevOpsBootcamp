#   - Mirrors production as closely as possible
#   - 2 API replicas with the Compose v3 deploy block
#   - Nginx reverse-proxy in front of the API
#   - No direct DB port exposure

services:
  api:
    image: multi-env-node-app:${APP_VERSION:-latest}
    container_name: ""          # Allow replicas (no fixed container name)
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
    environment:
      - LOG_LEVEL=warn
    ports: []                   # Traffic enters through nginx only

  nginx:
    image: nginx:1.25-alpine
    container_name: app_staging_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

  db:
    container_name: app_staging_db
