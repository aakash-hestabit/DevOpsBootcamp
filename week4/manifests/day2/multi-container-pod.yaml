apiVersion: v1
kind: Pod
metadata:
  name: webapp-with-sidecar
  labels:
    app: webapp
    pattern: sidecar
spec:
  containers:
    # Main application container
    - name: webapp
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log/nginx
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"
    
    # Sidecar container - processes logs
    - name: log-reader
      image: busybox:1.36
      command: ['sh', '-c']
      args:
        - |
          echo "Log reader sidecar started"
          while true; do
            if [ -f /logs/access.log ]; then
              echo "=== Latest log entries ==="
              tail -3 /logs/access.log
            fi
            sleep 10
          done
      volumeMounts:
        - name: shared-logs
          mountPath: /logs
          readOnly: true
      resources:
        requests:
          memory: "32Mi"
          cpu: "50m"
        limits:
          memory: "64Mi"
          cpu: "100m"
  
  # Shared volume between containers
  volumes:
    - name: shared-logs
      emptyDir: {}
