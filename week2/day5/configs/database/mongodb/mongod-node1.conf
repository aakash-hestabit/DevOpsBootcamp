# MongoDB Configuration File - Node 1 (Primary)
# Port: 27017

# Where and how to store data
storage:
  dbPath: /home/aakash/Desktop/DevOpsBootcamp/week2/day5/stack1_next_node_mongodb/mongodb-replicaset/data/node1

# Where to write logging data
systemLog:
  destination: file
  logAppend: true
  path: /home/aakash/Desktop/DevOpsBootcamp/week2/day5/stack1_next_node_mongodb/mongodb-replicaset/logs/mongod-node1.log

# Network interfaces
net:
  port: 27017
  bindIp: 127.0.0.1

# Process management
processManagement:
  fork: true
  pidFilePath: /home/aakash/Desktop/DevOpsBootcamp/week2/day5/stack1_next_node_mongodb/mongodb-replicaset/mongod-node1.pid

# Security
security:
  authorization: enabled
  keyFile: /home/aakash/Desktop/DevOpsBootcamp/week2/day5/stack1_next_node_mongodb/mongodb-replicaset/config/replica-keyfile

# Replication
replication:
  replSetName: rs0