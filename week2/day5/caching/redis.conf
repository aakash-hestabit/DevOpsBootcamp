# Redis Configuration for DevOps Bootcamp — All Stacks
# File: caching/redis.conf
# Deploy: sudo cp redis.conf /etc/redis/redis.conf && sudo systemctl restart redis-server

# --- Network ---
bind 127.0.0.1 ::1
port 6379
protected-mode yes
tcp-backlog 511
timeout 300
tcp-keepalive 300

# --- Authentication ---
requirepass DevOpsRedis@123

# --- Memory ---
maxmemory 256mb
maxmemory-policy allkeys-lru
# allkeys-lru: evict any key using LRU when memory is full
# Best for caching workloads where all keys are expendable

# --- Persistence (RDB snapshots) ---
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /var/lib/redis

# --- Append Only File (AOF) ---
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# --- Logging ---
loglevel notice
logfile /var/log/redis/redis-server.log

# --- Clients ---
maxclients 1000

# --- Slow Log ---
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- Key expiration ---
hz 10
dynamic-hz yes

# --- Databases ---
databases 4
# DB 0: Stack 1 (Node.js + MongoDB)
# DB 1: Stack 2 (Laravel + MySQL)
# DB 2: Stack 3 (FastAPI + MySQL)
# DB 3: Shared / sessions
