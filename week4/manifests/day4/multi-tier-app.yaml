# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: demo
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
      tier: backend
  template:
    metadata:
      labels:
        app: demo
        tier: backend
    spec:
      containers:
        - name: backend
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      initContainers:
        - name: create-response
          image: busybox:1.36
          command: ['sh', '-c', 'echo "Backend Response from $(hostname)" > /html/index.html']
          volumeMounts:
            - name: html
              mountPath: /html
      volumes:
        - name: html
          emptyDir: {}

---
# Backend Service (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  labels:
    app: demo
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: demo
    tier: backend
  ports:
    - port: 80
      targetPort: 80

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: demo
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo
      tier: frontend
  template:
    metadata:
      labels:
        app: demo
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      initContainers:
        - name: create-page
          image: busybox:1.36
          command: ['sh', '-c']
          args:
            - |
              cat > /html/index.html << 'EOF'
              <!DOCTYPE html>
              <html>
              <head><title>Frontend</title></head>
              <body>
              <h1>Frontend Pod: HOSTNAME</h1>
              <p>I talk to backend-service internally!</p>
              </body>
              </html>
              EOF
              sed -i "s/HOSTNAME/$(hostname)/" /html/index.html
          volumeMounts:
            - name: html
              mountPath: /html
      volumes:
        - name: html
          emptyDir: {}


---
# Frontend Service (NodePort for external access)
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: demo
    tier: frontend
spec:
  type: NodePort
  selector:
    app: demo
    tier: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
