# Apache Python Reverse Proxy Virtual Host
<VirtualHost *:80>
    ServerName python.devops.local
    Redirect permanent / https://python.devops.local/
</VirtualHost>

<VirtualHost *:443>
    ServerName python.devops.local

    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/devops.local.crt
    SSLCertificateKeyFile /etc/ssl/private/devops.local.key
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5

    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog  ${APACHE_LOG_DIR}/python-proxy.error.log
    CustomLog ${APACHE_LOG_DIR}/python-proxy.access.log combined
</VirtualHost>
