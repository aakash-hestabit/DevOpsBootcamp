apiVersion: v1
kind: Pod
metadata:
  name: nginx-healthy
  labels:
    app: nginx
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80
      
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"
      
      # Liveness Probe: Is the container alive?
      # If it fails, Kubernetes RESTARTS the container
      livenessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5    # Wait 5s before first check
        periodSeconds: 10         # Check every 10s
        timeoutSeconds: 3         # Timeout after 3s
        failureThreshold: 3       # Restart after 3 failures
      
      # Readiness Probe: Is the container ready for traffic?
      # If it fails, Kubernetes REMOVES from service endpoints
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 3    # Wait 3s before first check
        periodSeconds: 5          # Check every 5s
        successThreshold: 1       # Ready after 1 success
