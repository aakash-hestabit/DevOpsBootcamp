# Apache Node.js Reverse Proxy Virtual Host
<VirtualHost *:80>
    ServerName node.devops.local
    Redirect permanent / https://node.devops.local/
</VirtualHost>

<VirtualHost *:443>
    ServerName node.devops.local

    SSLEngine on
    SSLCertificateFile    /etc/ssl/certs/devops.local.crt
    SSLCertificateKeyFile /etc/ssl/private/devops.local.key
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5

    # Proxy settings
    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Proxy headers
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"

    # Security headers
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"

    ErrorLog  ${APACHE_LOG_DIR}/nodejs-proxy.error.log
    CustomLog ${APACHE_LOG_DIR}/nodejs-proxy.access.log combined
</VirtualHost>
