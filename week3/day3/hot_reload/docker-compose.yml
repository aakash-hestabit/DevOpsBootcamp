version: '3.8'

services:

  api:
    build: ./api
    volumes:
      - ./api/src:/app/src:ro
      - ./api/config:/app/config:ro
      - ./logs/api:/app/logs
      - node_modules_api:/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000

  frontend:
    build: ./frontend
    volumes:
      - ./frontend/src:/usr/share/nginx/html:ro
      - ./logs/frontend:/var/log/nginx
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  node_modules_api:
