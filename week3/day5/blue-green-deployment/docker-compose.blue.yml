# "blue" version of the application
services:
  app-blue:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: bg-node-app:blue
    container_name: app-blue
    restart: unless-stopped
    environment:
      - COLOR=blue
      - APP_VERSION=1.0.0
      - PORT=3000
    networks:
      - bg-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health | grep -q '\"status\":\"OK\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  bg-network:
    external: true
