# nginx.conf — Blue-Green traffic router
#
# The blue-green-deploy.sh script switches traffic by editing the upstream
# block below with sed, then reloading nginx:
#   docker exec bg-nginx nginx -s reload
#
# Active   line starts with: "    server app-<color>:3000;"
# Inactive line starts with: "    # server app-<color>:3000;"

upstream backend {
    server app-blue:3000;
    # server app-green:3000;
}

server {
    listen 80;

    location / {
        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
