apiVersion: v1
kind: Pod
metadata:
  name: nginx-limited
  labels:
    app: nginx
    tier: frontend
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80
          name: http
      
      # Resource management - IMPORTANT for production!
      resources:
        # Minimum resources guaranteed
        requests:
          memory: "64Mi"    # 64 Megabytes
          cpu: "100m"       # 100 millicores (0.1 CPU)
        
        # Maximum resources allowed
        limits:
          memory: "128Mi"   # 128 Megabytes
          cpu: "200m"       # 200 millicores (0.2 CPU)