apiVersion: v1
kind: Service
metadata:
  name: webapp-nodeport
  labels:
    app: webapp
spec:
  type: NodePort
  selector:
    app: webapp
  ports:
    - name: http
      port: 80           # Service port (internal)
      targetPort: 80     # Container port
      nodePort: 30080    # External port (30000-32767)
      protocol: TCP